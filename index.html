<!DOCTYPE html>
<html>
<head>
    <title>Encrypted Notes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f7f7f5;
            margin: 0;
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        h2 {
            margin-bottom: 5px;
        }

        .subtitle {
            color: #6b6b6b;
            font-size: 14px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            outline: none;
        }

        input {
            width: 100%;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            font-size: 14px;
            outline: none;
        }

        textarea:focus, input:focus {
            border-color: #999;
        }

        .buttons {
            margin-top: 15px;
        }

        button {
            background: #111;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            margin-right: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        button:hover {
            background: #333;
        }

        .output-box {
            background: #fafafa;
            border: 1px solid #eee;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
            word-wrap: break-word;
        }

        h3 {
            margin-top: 25px;
            font-size: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Encrypted Notes</h2>
    <div class="subtitle">
        AES (secure) vs Vigenère (demo comparison)
    </div>

    <textarea id="note" placeholder="Write your note..."></textarea>
    <input type="text" id="key" placeholder="Encryption key">

    <div class="buttons">
        <button onclick="encrypt()">Encrypt</button>
        <button onclick="decrypt()">Decrypt</button>
        <button onclick="downloadNote()">Download</button>
    </div>

    <h3>AES Encrypted</h3>
    <div class="output-box" id="aesEncrypted"></div>

    <h3>Vigenère Encrypted</h3>
    <div class="output-box" id="vigEncrypted"></div>

    <h3>Decrypted</h3>
    <div class="output-box" id="decrypted"></div>

</div>

<script>

// AES using :contentReference[oaicite:0]{index=0}
function encryptAES(text, key) {
    return CryptoJS.AES.encrypt(text, key).toString();
}

function decryptAES(cipher, key) {
    const bytes = CryptoJS.AES.decrypt(cipher, key);
    return bytes.toString(CryptoJS.enc.Utf8);
}

// :contentReference[oaicite:1]{index=1}
function vigenereEncrypt(text, key) {
    let result = "";
    key = key.toUpperCase();
    let j = 0;

    for (let i = 0; i < text.length; i++) {
        let char = text[i];

        if (/[a-zA-Z]/.test(char)) {
            let base = char === char.toUpperCase() ? 65 : 97;
            let shift = key.charCodeAt(j % key.length) - 65;

            result += String.fromCharCode(
                ((char.charCodeAt(0) - base + shift) % 26) + base
            );
            j++;
        } else {
            result += char;
        }
    }
    return result;
}

let storedAES = "";

function encrypt() {
    const text = document.getElementById("note").value;
    const key = document.getElementById("key").value;

    if (!text || !key) {
        alert("Enter both note and key!");
        return;
    }

    storedAES = encryptAES(text, key);
    const vig = vigenereEncrypt(text, key);

    document.getElementById("aesEncrypted").innerText = storedAES;
    document.getElementById("vigEncrypted").innerText = vig;
    document.getElementById("decrypted").innerText = "";
}

function decrypt() {
    const key = document.getElementById("key").value;

    if (!storedAES) {
        alert("Encrypt first!");
        return;
    }

    const decrypted = decryptAES(storedAES, key);
    document.getElementById("decrypted").innerText = decrypted;
}

function downloadNote() {
    if (!storedAES) {
        alert("Encrypt the note first!");
        return;
    }

    const content = storedAES;
    const blob = new Blob([content], { type: "text/plain" });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "encrypted_note.txt";
    a.click();
}

</script>

</body>
</html>
